name: agent-trace-handoff

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://localhost:9200/_cluster/health | grep -qE '"status":"(green|yellow)"'
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.2
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "127.0.0.1:5601:5601"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://localhost:5601/api/status | grep -qE '"level":"available"'
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  apm-server:
    image: docker.elastic.co/apm/apm-server:9.4.2
    depends_on:
      elasticsearch:
        condition: service_healthy
    command:
      - -e
      - -E
      - apm-server.host=0.0.0.0:8200
      - -E
      - output.elasticsearch.hosts=["http://elasticsearch:9200"]
    ports:
      - "127.0.0.1:8200:8200"
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - >-
          exec 3<>/dev/tcp/localhost/8200; printf "GET / HTTP/1.0\r\n\r\n" >&3; read -t 5 line <&3; case "$$line" in *200*) exit 0;; *) exit 1;; esac
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

volumes:
  elasticsearch-data:
    driver: local
